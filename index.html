<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dropshipping Store</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>My Dropshipping Store</h1>
<p>UPI + WhatsApp Orders</p>
</header>

<nav>
<button onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
</nav>

<!-- PRODUCTS -->
<div class="container" id="productList"></div>

<!-- CART -->
<div class="cart-box" id="cartBox">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total">0</span></h3>
<button onclick="showOrder()">Checkout</button>
</div>

<!-- ORDER FORM -->
<div class="order-box" id="orderBox" style="display:none">
<h2>Order Details</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="payUPI()">Pay via UPI</button>
<button onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
